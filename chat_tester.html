<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ekthaa AI — Demo Chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #7c3aed;
      --primary-dark: #6d28d9;
      --secondary: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --dark-bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --border: #2a2a4a;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: var(--dark-bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 32px;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
      animation: pulse 2s infinite;
    }

    .status-indicator.online {
      background: var(--success);
      animation: pulse-success 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes pulse-success {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    }

    /* Config Bar */
    .config-bar {
      background: var(--card-bg);
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .config-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .config-group label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .config-group select {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .config-group select:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .demo-badge {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid var(--success);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Quick Actions */
    .quick-actions {
      background: var(--card-bg);
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      overflow-x: auto;
    }

    .quick-btn {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid var(--primary);
      border-radius: 24px;
      color: var(--text);
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .quick-btn:hover {
      background: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }

    .quick-btn:active {
      transform: translateY(0);
    }

    /* Chat Area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .bubble {
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
      max-width: 80%;
    }

    .bubble.user {
      align-self: flex-end;
      flex-direction: row-reverse;
      max-width: 75%;
    }

    .bubble.bot {
      align-self: flex-start;
    }

    .bubble-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .bubble.user .bubble-avatar {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    }

    .bubble.bot .bubble-avatar {
      background: rgba(124, 58, 237, 0.2);
    }

    .bubble-content {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      line-height: 1.6;
      font-size: 14px;
    }

    .bubble.user .bubble-content {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot .bubble-content {
      border-bottom-left-radius: 4px;
    }

    .bubble-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      display: flex;
      gap: 8px;
    }

    .bubble.typing .bubble-content {
      background: rgba(124, 58, 237, 0.2);
      border-color: var(--primary);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Input Area */
    .input-area {
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    #msgInput {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      resize: none;
      max-height: 100px;
      font-family: inherit;
    }

    #msgInput:focus {
      border-color: var(--primary);
      background: rgba(124, 58, 237, 0.05);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    #msgInput::placeholder {
      color: var(--text-muted);
    }

    #sendBtn {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 10px;
      color: white;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
    }

    #sendBtn:active:not(:disabled) {
      transform: translateY(0);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* Business Cards */
    .business-card {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(79, 70, 229, 0.05) 100%);
      border: 1px solid var(--primary);
      border-radius: 12px;
      padding: 14px 16px;
      margin: 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .business-card:hover {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15) 0%, rgba(79, 70, 229, 0.1) 100%);
      border-color: #a78bfa;
      transform: translateX(4px);
    }

    .business-card-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .business-card-content {
      flex: 1;
    }

    .business-card-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .business-card-details {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .business-score {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .businesses-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Business Modal/Details  */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.2s;
    }

    .modal.open {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.3s;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-close {
      background: rgba(239, 68, 68, 0.1);
      border: none;
      color: var(--danger);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .modal-section {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-section:last-child {
      border-bottom: none;
    }

    .modal-section-title {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .modal-field {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .modal-field-icon {
      font-size: 20px;
      flex-shrink: 0;
    }

    .modal-field-value {
      flex: 1;
    }

    .city-name {
      font-weight: 600;
      color: var(--text);
    }

    .distance-badge {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
    }

    .rating-stars {
      color: #fbbf24;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .config-bar {
        gap: 12px;
      }

      .bubble {
        max-width: 90%;
      }

      .bubble.user {
        max-width: 85%;
      }

      header {
        padding: 14px 16px;
      }

      .header-info h1 {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">🤖</div>
      <div class="header-info">
        <h1>Ekthaa AI Assistant</h1>
        <p>Demo Mode • No Authentication Required</p>
      </div>
    </div>
    <div class="header-status">
      <div class="status-indicator" id="statusIndicator"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Config Bar -->
  <div class="config-bar">
    <div class="demo-badge">
      ✨ Demo Mode Active
    </div>
    <div class="config-group">
      <label>Language</label>
      <select id="lang">
        <option value="en">English</option>
        <option value="hi">Hindi (Hinglish)</option>
        <option value="te">Telugu</option>
        <option value="ta">Tamil</option>
        <option value="mr">Marathi</option>
        <option value="bn">Bengali</option>
      </select>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="ask('What is my total due?')">💰 Total Due?</button>
    <button class="quick-btn" onclick="ask('Which shop do I owe the most?')">🏪 Biggest Debt?</button>
    <button class="quick-btn" onclick="ask('How much did I spend this month?')">📊 Monthly Spend?</button>
    <button class="quick-btn" onclick="ask('Give me savings tips')">💡 Save Money Tips</button>
    <button class="quick-btn" onclick="ask('Show me shops near me')">🗺️ Shops Near Me</button>
    <button class="quick-btn" onclick="shareLocation()">📍 Share Location</button>
    <button class="quick-btn" onclick="ask('Tell me a joke')">🃏 Joke Test</button>
    <button class="quick-btn" style="margin-left: auto; background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger);" onclick="clearChat()">🗑️ Clear Chat</button>
  </div>

  <!-- Chat Area -->
  <div id="chat">
    <div class="bubble bot">
      <div class="bubble-avatar">🤖</div>
      <div>
        <div class="bubble-content">
          👋 <strong>Hey there!</strong> I'm Ekthaa, your AI assistant. Ask me anything about your dues, transactions, or nearby shops!
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <input 
      id="msgInput" 
      type="text"
      placeholder="Ask about your dues, transactions, shops..." 
      onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); send(); }"
    />
    <button id="sendBtn" onclick="send()">📤</button>
  </div>

  <!-- Business Details Modal -->
  <div id="businessModal" class="modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modalName"></h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      
      <div class="modal-section">
        <div class="modal-section-title">📍 Location</div>
        <div class="modal-field">
          <div class="modal-field-icon">🏢</div>
          <div class="modal-field-value">
            <div id="modalCity" class="city-name"></div>
            <div id="modalAddress" style="font-size: 12px; color: var(--text-muted);"></div>
          </div>
        </div>
        <div class="modal-field" id="distanceField" style="display: none;">
          <div class="modal-field-icon">📐</div>
          <div class="modal-field-value distance-badge" id="modalDistance"></div>
        </div>
      </div>

      <div class="modal-section" id="contactSection" style="display: none;">
        <div class="modal-section-title">📞 Contact</div>
        <div class="modal-field" id="phoneField" style="display: none;">
          <div class="modal-field-icon">☎️</div>
          <div class="modal-field-value" id="modalPhone"></div>
        </div>
        <div class="modal-field" id="emailField" style="display: none;">
          <div class="modal-field-icon">✉️</div>
          <div class="modal-field-value" id="modalEmail"></div>
        </div>
      </div>

      <div class="modal-section" id="ratingSection" style="display: none;">
        <div class="modal-section-title">⭐ Rating</div>
        <div class="modal-field">
          <div class="modal-field-icon rating-stars" id="modalStars"></div>
          <div class="modal-field-value">
            <span id="modalRating"></span>
            <span id="modalReviews" style="color: var(--text-muted); font-size: 12px;"></span>
          </div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">📊 Relevance</div>
        <div class="modal-field">
          <div class="modal-field-icon">🎯</div>
          <div class="modal-field-value">
            <div class="business-score" id="modalScore"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BASE = 'http://localhost:5001';
    let history = [];
    let userLat = null;
    let userLng = null;
    const currentUserId = 'demo_user';
    let selectedBusiness = null;

    // Calculate distance in km using Haversine formula
    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371; // Earth's radius in km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Modal functions
    function openBusinessDetails(business) {
      selectedBusiness = business;
      document.getElementById('modalName').textContent = business.name || 'Unknown';
      document.getElementById('modalCity').textContent = business.city || 'Location not available';
      document.getElementById('modalAddress').textContent = business.address || '';
      document.getElementById('modalPhone').textContent = business.phone || 'Not available';
      document.getElementById('modalEmail').textContent = business.email || 'Not available';
      document.getElementById('modalScore').textContent = `Match: ${(business.score * 100).toFixed(0)}%`;

      // Show/hide sections based on available data
      document.getElementById('contactSection').style.display = 
        (business.phone || business.email) ? 'block' : 'none';
      document.getElementById('phoneField').style.display = business.phone ? 'flex' : 'none';
      document.getElementById('emailField').style.display = business.email ? 'flex' : 'none';
      
      if (business.rating && business.rating > 0) {
        document.getElementById('ratingSection').style.display = 'block';
        document.getElementById('modalStars').textContent = '⭐'.repeat(Math.round(business.rating));
        document.getElementById('modalRating').textContent = `${business.rating.toFixed(1)} out of 5`;
        document.getElementById('modalReviews').textContent = ` • ${business.reviews || 0} reviews`;
      } else {
        document.getElementById('ratingSection').style.display = 'none';
      }

      // Calculate and show distance if we have coordinates
      if (userLat && userLng && business.latitude && business.longitude) {
        const dist = calculateDistance(userLat, userLng, business.latitude, business.longitude);
        document.getElementById('distanceField').style.display = 'flex';
        document.getElementById('modalDistance').textContent = `${dist.toFixed(1)} km away`;
      } else {
        document.getElementById('distanceField').style.display = 'none';
      }

      document.getElementById('businessModal').classList.add('open');
    }

    function closeModal(event) {
      if (event && event.target.id !== 'businessModal') return;
      document.getElementById('businessModal').classList.remove('open');
      selectedBusiness = null;
    }

    // Close modal on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Health Check
    async function checkHealth() {
      try {
        const response = await fetch(`${BASE}/api/health`);
        const data = await response.json();
        if (data.status === 'ok') {
          document.getElementById('statusIndicator').classList.add('online');
          document.getElementById('statusText').textContent = '🟢 Server Online';
          return true;
        }
      } catch (error) {
        console.error('Health check failed:', error);
      }
      document.getElementById('statusIndicator').classList.remove('online');
      document.getElementById('statusText').textContent = '🔴 Server Offline';
      return false;
    }

    // Check health immediately and every 10 seconds
    checkHealth();
    setInterval(checkHealth, 10000);

    // Share Location
    function shareLocation() {
      const el = document.querySelector('button[onclick="shareLocation()"]');
      if (!navigator.geolocation) {
        addBubble('❌ Geolocation not supported in your browser.', 'bot');
        return;
      }

      el.disabled = true;
      el.textContent = '📍 Getting location...';

      navigator.geolocation.getCurrentPosition(
        (position) => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;
          el.textContent = `📍 ${userLat.toFixed(3)}, ${userLng.toFixed(3)}`;
          el.style.background = 'rgba(16, 185, 129, 0.2)';
          el.style.borderColor = 'var(--success)';
          el.style.color = 'var(--success)';
          addBubble(`📍 Location shared: <strong>${userLat.toFixed(4)}, ${userLng.toFixed(4)}</strong>\n\nNow try "Show me shops near me" to find nearby businesses!`, 'bot');
          el.disabled = false;
        },
        (error) => {
          el.textContent = '📍 Share Location';
          el.disabled = false;
          addBubble(`❌ Location Error: ${error.message}`, 'bot');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    // Add Message Bubble
    function addBubble(text, role, meta = '', businesses = null) {
      const chatArea = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = `bubble ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'bubble-avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';

      const content = document.createElement('div');
      const contentDiv = document.createElement('div');
      contentDiv.className = 'bubble-content';
      contentDiv.innerHTML = text.replace(/\n/g, '<br>');

      content.appendChild(contentDiv);

      // Add business cards if available
      if (businesses && businesses.length > 0) {
        const cardsContainer = document.createElement('div');
        cardsContainer.className = 'businesses-container';
        
        businesses.forEach(biz => {
          const card = document.createElement('div');
          card.className = 'business-card';
          card.style.cursor = 'pointer';
          
          const distance = (userLat && userLng && biz.latitude && biz.longitude) 
            ? `${calculateDistance(userLat, userLng, biz.latitude, biz.longitude).toFixed(1)} km away`
            : (biz.city ? `📍 ${biz.city}` : '');
          
          card.innerHTML = `
            <div class="business-card-icon">🏪</div>
            <div class="business-card-content">
              <div class="business-card-name">${biz.name || 'Unknown Business'}</div>
              <div class="business-card-details">
                ${distance ? `<span>${distance}</span>` : ''}
                ${biz.score ? `<span class="business-score">Match: ${(biz.score * 100).toFixed(0)}%</span>` : ''}
              </div>
            </div>
          `;
          
          card.onclick = () => openBusinessDetails(biz);
          cardsContainer.appendChild(card);
        });
        
        content.appendChild(cardsContainer);
      }

      if (meta) {
        const metaDiv = document.createElement('div');
        metaDiv.className = 'bubble-meta';
        metaDiv.textContent = meta;
        content.appendChild(metaDiv);
      }

      div.appendChild(avatar);
      div.appendChild(content);
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    // Send Message
    async function send() {
      const input = document.getElementById('msgInput');
      const message = input.value.trim();
      if (!message) return;

      input.value = '';
      await ask(message);
    }

    // Ask AI
    async function ask(message) {
      const language = document.getElementById('lang').value;
      addBubble(message, 'user');

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      const typingBubble = addBubble('Thinking...', 'bot typing');

      try {
        const startTime = Date.now();
        const response = await fetch(`${BASE}/api/ai/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message,
            language,
            history,
            ...(userLat && userLng && { latitude: userLat, longitude: userLng })
          })
        });

        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        const data = await response.json();

        typingBubble.remove();

        if (data.reply) {
          addBubble(data.reply, 'bot', `${data.model_used} • ${elapsed}s • ${language.toUpperCase()}`, data.businesses);
          history.push({ role: 'user', content: message });
          history.push({ role: 'model', content: data.reply });
          if (history.length > 20) history = history.slice(-20);
        } else {
          addBubble(`❌ Error: ${data.error || 'Unknown error'}`, 'bot');
        }
      } catch (error) {
        typingBubble.remove();
        addBubble(`❌ Network Error: ${error.message}`, 'bot');
      } finally {
        sendBtn.disabled = false;
        document.getElementById('msgInput').focus();
      }
    }

    // Clear Chat
    function clearChat() {
      history = [];
      document.getElementById('chat').innerHTML = '';
      addBubble('🗑️ Chat history cleared. Ready for a fresh conversation!', 'bot');
    }

    // Focus input on load
    window.addEventListener('load', () => {
      document.getElementById('msgInput').focus();
    });
  </script>
</body>
</html>
